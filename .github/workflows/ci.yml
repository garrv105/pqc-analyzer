name: PQC-Analyzer CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION_DEFAULT: "3.11"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Format
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff black isort

      - name: Run ruff
        run: ruff check pqc_analyzer/ tests/ scripts/

      - name: Run black (check mode)
        run: black --check pqc_analyzer/ tests/ scripts/

      - name: Run isort (check mode)
        run: isort --check-only pqc_analyzer/ tests/ scripts/

  # ─────────────────────────────────────────────
  # JOB 2: Test Matrix
  # ─────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project (without optional Qiskit)
        # Qiskit is optional — skip in standard CI to keep install fast
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          PQC_ANALYZER_ENV: "test"
          # Disable matplotlib display in CI
          MPLBACKEND: "Agg"
        run: |
          pytest tests/ \
            --cov=pqc_analyzer \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: pqc-analyzer
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 3: Qiskit Integration Tests (optional)
  # Runs only on main/develop push, not on PRs
  # to keep PR feedback fast
  # ─────────────────────────────────────────────
  test-qiskit:
    name: Qiskit Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install project with Qiskit extras
        run: |
          pip install -e ".[dev,qiskit]"

      - name: Run Qiskit circuit tests
        env:
          MPLBACKEND: "Agg"
          PQC_ANALYZER_ENV: "test"
        run: |
          pytest tests/test_attack_models.py \
            -k "qiskit or circuit or quantum" \
            --tb=short \
            -v \
            --timeout=120

  # ─────────────────────────────────────────────
  # JOB 4: Cryptographic Correctness Tests
  # Runs KEM encrypt/decrypt round-trips at all
  # Kyber parameter sets (512, 768, 1024)
  # ─────────────────────────────────────────────
  kyber-correctness:
    name: Kyber KEM Correctness
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Run Kyber correctness suite
        run: |
          pytest tests/test_kyber.py \
            -v \
            --tb=long \
            -x \
            --timeout=60

      - name: Run full analysis pipeline smoke test
        env:
          MPLBACKEND: "Agg"
        run: |
          python scripts/run_analysis.py \
            --algorithms kyber512 rsa2048 \
            --output-dir /tmp/ci-output \
            --no-show

      - name: Verify output artifacts
        run: |
          test -f /tmp/ci-output/security_landscape.png && echo "security_landscape OK"
          test -f /tmp/ci-output/performance_comparison.png && echo "performance_comparison OK"

  # ─────────────────────────────────────────────
  # JOB 5: Security Scan
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run bandit
        run: |
          bandit -r pqc_analyzer/ \
            -x pqc_analyzer/tests \
            -ll \
            -f json \
            -o bandit-report.json || true
          bandit -r pqc_analyzer/ -x pqc_analyzer/tests -ll

      - name: Run pip-audit
        run: pip-audit || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # JOB 6: Docker Build
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: pqc-analyzer:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 7: Release (main branch only)
  # ─────────────────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [test, kyber-correctness, security, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel
        run: twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pqc-analyzer-wheel-${{ github.sha }}
          path: dist/*.whl
          retention-days: 30
